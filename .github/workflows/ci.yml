name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Drop local replace
        run: go mod edit -dropreplace github.com/cemc-oper/hpc-model-go

      - name: Build
        run: make build

      - name: Test
        run: go test ./...
